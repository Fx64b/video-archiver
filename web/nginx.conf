server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Long-lived caching for hashed build assets
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # WebSocket endpoint — needs the Upgrade handshake headers and no read
    # timeout (the connection is long-lived and pinged by the backend).
    location /api/ws {
        proxy_pass http://backend:8080/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }

    # Backend API under the same origin: /api/<route> -> backend /<route>.
    # The trailing slash on proxy_pass strips the /api prefix. Buffering is
    # off so video streaming and range requests pass through untouched.
    location /api/ {
        proxy_pass http://backend:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;
        proxy_request_buffering off;
        client_max_body_size 0;
    }

    # SPA fallback: serve index.html for client-side routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
